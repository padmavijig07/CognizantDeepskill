<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>React Task Board</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script><script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script><script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>body{margin:0;background:#eef2f0;color:#20312d;font:16px system-ui,sans-serif}.app{max-width:900px;margin:auto;padding:40px 22px}.top{display:flex;justify-content:space-between;align-items:center;gap:16px}.top h1{font:700 38px Georgia,serif}.tabs{display:flex;gap:8px}.tabs a,.button{border:1px solid #bdcbc5;border-radius:5px;padding:9px 13px;color:inherit;text-decoration:none;background:white;cursor:pointer}.tabs a.active,.button{background:#20312d;color:white}.board{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-top:25px}.column{background:#dce7e1;padding:14px;border-radius:8px}.column h2{margin:0 0 12px;font-size:15px}.task{background:white;padding:14px;margin:10px 0;border-left:4px solid #dd795e;border-radius:4px}.task p{margin:0 0 10px}.task small{color:#70817a}@media(max-width:650px){.top{align-items:flex-start;flex-direction:column}.board{grid-template-columns:1fr}.top h1{font-size:32px}}</style>
</head>
<body><div id="root"></div>
<script type="text/babel">
const {useEffect, useState} = React;
const seed = [{id:1,title:'Map user journey',status:'Todo',owner:'Mina'},{id:2,title:'Review API contract',status:'Doing',owner:'Arun'},{id:3,title:'Ship empty state',status:'Done',owner:'Jo'}];
function useHashRoute(){const [route,setRoute]=useState(location.hash||'#board');useEffect(()=>{const update=()=>setRoute(location.hash||'#board');addEventListener('hashchange',update);return()=>removeEventListener('hashchange',update)},[]);return route}
function App(){const [tasks,setTasks]=useState(()=>JSON.parse(localStorage.getItem('week5-tasks')||'null')||seed);const route=useHashRoute();useEffect(()=>localStorage.setItem('week5-tasks',JSON.stringify(tasks)),[tasks]);const addTask=()=>setTasks([...tasks,{id:Date.now(),title:'New planning task',status:'Todo',owner:'You'}]);if(route==='#about')return <main className="app"><div className="top"><h1>About the board</h1><nav className="tabs"><a href="#board">Board</a></nav></div><p>This small React SPA demonstrates state, an effect that persists tasks, and hash-based route navigation.</p></main>;return <main className="app"><div className="top"><h1>Focus board</h1><nav className="tabs"><a className="active" href="#board">Board</a><a href="#about">About</a><button className="button" onClick={addTask}>Add task</button></nav></div><section className="board">{['Todo','Doing','Done'].map(status=><div className="column" key={status}><h2>{status.toUpperCase()}</h2>{tasks.filter(task=>task.status===status).map(task=><article className="task" key={task.id}><p>{task.title}</p><small>Owner: {task.owner}</small></article>)}</div>)}</section></main>};ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script></body></html>
