<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Vue Product Shelf</title><script src="https://unpkg.com/vue@3/dist/vue.global.js"></script><style>body{margin:0;background:#fbf7ef;color:#28241f;font:16px system-ui,sans-serif}.app{max-width:980px;margin:auto;padding:42px 22px}.eyebrow{color:#b15e36;font-size:12px;letter-spacing:2px;text-transform:uppercase}.head{display:flex;justify-content:space-between;align-items:end;gap:20px}.head h1{font:500 54px Georgia,serif;margin:8px 0}.controls{display:flex;gap:10px;margin:25px 0}.controls input,.controls select{border:1px solid #d7cfc2;background:#fff;padding:12px;border-radius:4px;font:inherit}.list{display:grid;grid-template-columns:repeat(3,1fr);gap:15px}.product{background:#fff;border:1px solid #e1d8c9;padding:20px;min-height:150px;display:flex;flex-direction:column;justify-content:space-between}.product h2{font:24px Georgia,serif;margin:0}.price{font-weight:700;color:#b15e36}.empty{color:#756c61}@media(max-width:700px){.head{align-items:start;flex-direction:column}.head h1{font-size:42px}.list{grid-template-columns:1fr 1fr}}@media(max-width:450px){.list{grid-template-columns:1fr}.controls{flex-direction:column}}</style></head>
<body><div id="app" class="app"><div class="head"><div><div class="eyebrow">Vue 3 / reactive catalog</div><h1>Everyday objects</h1></div><div>{{ filteredProducts.length }} objects</div></div><div class="controls"><input v-model="search" placeholder="Search the shelf" aria-label="Search products"><select v-model="category" aria-label="Filter by category"><option value="All">All categories</option><option v-for="item in categories" :value="item">{{ item }}</option></select></div><section class="list"><article class="product" v-for="product in filteredProducts" :key="product.id"><div><h2>{{ product.name }}</h2><p>{{ product.category }}</p></div><span class="price">${{ product.price }}</span></article></section><p class="empty" v-if="filteredProducts.length === 0">No objects match your search.</p></div><script>const {createApp,computed,ref}=Vue;createApp({setup(){const search=ref(''),category=ref('All');const products=[{id:1,name:'Oak notebook',category:'Desk',price:18},{id:2,name:'Stoneware mug',category:'Kitchen',price:24},{id:3,name:'Canvas tote',category:'Carry',price:32},{id:4,name:'Brass ruler',category:'Desk',price:12},{id:5,name:'Linen apron',category:'Kitchen',price:46},{id:6,name:'Travel bottle',category:'Carry',price:28}];const categories=['Desk','Kitchen','Carry'];const filteredProducts=computed(()=>products.filter(item=>(category.value==='All'||item.category===category.value)&&item.name.toLowerCase().includes(search.value.toLowerCase())));return{search,category,categories,filteredProducts}}}).mount('#app');</script></body></html>
