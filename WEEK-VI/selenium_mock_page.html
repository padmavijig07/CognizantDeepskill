<!doctype html>
<html lang="en">
<head><meta charset="utf-8"><title>Automation Practice Page</title></head>
<body>
  <main>
    <h1 id="page-title">Automation Practice</h1>
    <label for="name">Name</label>
    <input id="name" type="text">
    <button id="greet" type="button">Greet</button>
    <p id="message"></p>
  </main>
  <script>
    document.getElementById('greet').addEventListener('click', function () {
      const name = document.getElementById('name').value.trim() || 'visitor';
      document.getElementById('message').textContent = `Hello, ${name}!`;
    });
  </script>
</body>
</html>
